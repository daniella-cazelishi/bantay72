<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Only</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {},
        },
      };
    </script>

    <script src="scripts/admin.js?v=2" type="module" defer></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Radio+Canada+Big:ital,wght@0,400..700;1,400..700&display=swap"
      rel="stylesheet"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=National+Park:wght@200..800&display=swap"
      rel="stylesheet"
    />
    <style>
      #radio-canada-big {
        font-family: "Radio Canada Big", sans-serif;
        font-optical-sizing: auto;
        font-weight: 600;
        font-style: normal;
      }
      #national-park {
        font-family: "National Park", sans-serif;
        font-optical-sizing: auto;
        font-weight: 400;
        font-style: normal;
      }

     
    </style>
  <script>if(localStorage.getItem("user_email")==="bantayteam72.admin@gmail.com" || sessionStorage.getItem("user_id")==="fGR7io5X2YfXcNqKA65HE8zYQfA2"){document.write("<style>a[href*=\"analytics_and_reports.html\"], a[href*=\"user-management.html\"] { display: none !important; }</style>");}</script></head>
  <body class="bg-gray-100 h-screen">
    <div class="flex h-full">
      <!-- Sidebar -->
      <aside class="bg-[#9F2424] text-white w-64 p-4 flex flex-col sidebar">
        <div class="flex items-center pb-8">
          <i class="fas fa-plus-circle text-2xl pr-3"></i>
          <span class="text-3xl font-bold" id="radio-canada-big"
            >Bantay 72</span
          >
        </div>
        <nav class="flex flex-col gap-5">
          <a
            href="dashboard.html"
            class="items-center flex flex-row gap-4 p-2 hover:bg-white hover:text-red-700 rounded-md transition"
            aria-label="Emergency Reports"
          >
            <i class="fas fa-users"></i>
            <span id="national-park">Emergency Reports</span>
          </a>
          <a
            href="volunteers.html"
            class="items-center flex flex-row gap-4 p-2 hover:bg-white hover:text-red-700 rounded-md transition"
            aria-label="Volunteers"
          >
            <i class="fas fa-user-shield"></i>
            <span id="national-park">Volunteers</span>
          </a>
          <a
            href="history.html"
            class="items-center flex flex-row gap-5 p-2 hover:bg-white hover:text-red-700 rounded-md transition"
            aria-label="History"
      >
            <i class="fas fa-history" aria-hidden="true"></i>
            <span id="national-park">History</span>
            </a>
          <a
            href="analytics_and_reports.html"
            class="items-center flex flex-row gap-5 p-2 hover:bg-white hover:text-red-700 rounded-md transition"
            aria-label="Analytics and Reports"
          >
            <i class="fas fa-chart-bar"></i>
            <span id="national-park">Analytics & Reports</span>
          </a>
          <a
            href="user-management.html"
            class="items-center flex flex-row gap-4 p-2 hover:bg-white hover:text-red-700 rounded-md transition"
            aria-label="User Management"
          >
            <i class="fas fa-user-cog"></i>
            <span id="national-park">User Management</span>
          </a>
        </nav>
        <div class="space-y-4 mt-auto">
          <a
            href="Settings.html"
            class="items-center flex flex-row gap-4 p-2 hover:bg-white hover:text-red-700 rounded-md transition"
            aria-label="Settings"
          >
            <i class="fas fa-cog"></i>
            <span id="national-park">Settings</span>
          </a>
          <a
            href="super_admin_dashboard.html"
            class="flex flex-row gap-3 items-center p-2 hover:bg-white hover:text-red-700 rounded-md transition"
            aria-label="Super Admin"
          >
            <i class="fas fa-user-shield"></i>
            <span id="national-park">Super Admin</span>
          </a>
        </div>
      </aside>

      <!-- Main Content -->
      <main class="flex-grow p-6">
        <div class="bg-white p-6 rounded-lg shadow-md">
          <h1 class="text-2xl font-bold mb-4">Super Admin Account</h1>
          <div class="flex items-center">
            <img
              src="images/profile.jpg"
              alt="Profile picture of Admin"
              class="w-24 h-24 rounded-full mr-4"
              width="100"
              height="100"
            />
            <div>
              <h2 class="text-xl font-semibold">Super Admin</h2>
              <p class="text-gray-600">Bantay 72</p>
            </div>
          </div>
        </div>

        <!-- Pending Residents Section -->
        <section class="mt-6">
          <h2 class="font-bold text-black mb-4 select-none text-2xl">
            Pending Residents
          </h2>
          <div class="overflow-x-auto max-h-[300px] overflow-y-auto shadow-lg">
            <table class="w-full bg-white">
              <thead class="bg-[#9c2626] text-white">
                <tr>
                  <th class="p-3">Fullname</th>
                  <th class="p-3">Address</th>
                  <th class="p-3">Email</th>
                  <th class="p-3">Date Registered</th>
                  <th class="p-3">Files</th>
                  <th class="p-3">Status</th>
                  <th class="p-3">Actions</th>
                </tr>
              </thead>
              <tbody class="relative">
                <tr id="loading-row">
                  <td colspan="7" class="p-3 text-center text-gray-500">
                    Loading reports...
                  </td>
                </tr>

                <tr id="no-data-row" class="hidden">
                  <td colspan="7" class="p-3 text-center text-gray-500">
                    No pending users available as of the moment
                  </td>
                </tr>
              </tbody>
            </table>

            <!-- Modal for File Preview -->
            <div id="fileModal" class="fixed top-0 left-0 w-full h-full bg-transparent items-center justify-center hidden">
              <div class="bg-white p-[20px] rounded-lg max-w-[600px] w-full">
                <span class="absolute top-[10px] right-[10px] text-[30px] cursor-pointer">&times;</span>
                <div id="filePreview"></div>
              </div>
            </div>
          </div>
        </section>
      </main>
    </div>
  </body>
</html>
