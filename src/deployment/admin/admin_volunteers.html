    #radio-canada-big {

    #national-park {

    .switch {
      position: relative;
      display: inline-block;
      width: 40px;
      height: 22px;
    }

    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #ccc;
      transition: 0.4s;
      border-radius: 34px;
    }

    .slider:before {
      position: absolute;
      content: "";
      height: 16px;
      width: 16px;
      left: 3px;
      bottom: 3px;
      background-color: white;
      transition: 0.4s;
      border-radius: 50%;
    }

    input:checked+.slider {
      background-color: #4f46e5;
    }

    input:checked+.slider:before {
      transform: translateX(18px);
    }

    .dark-mode {
      background-color: #1a202c;
      color: #e2e8f0;
    }

    .dark-mode .bg-white {
      background-color: #2d3748;
    }

    .dark-mode .text-gray-500 {
      color: #a0aec0;
    }

    .dark-mode .bg-gray-200 {
      background-color: #4a5568;
    }

    .dark-mode select {
      background-color: #2d3748;
      color: #cbd5e0;
    }

    .dark-mode .no-dark-mode {
      background-color: #e2e8f0;
      color: #4a5568;
    }
  </style>
