<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>History</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {},
        },
      };
    </script>
    <script type="module" src="scripts/history.js?v=2" defer></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Radio+Canada+Big:ital,wght@0,400..700;1,400..700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=National+Park:wght@200..800&display=swap"
      rel="stylesheet"
    />
    <style>
      #radio-canada-big {
        font-family: "Radio Canada Big", sans-serif;
        font-optical-sizing: auto;
        font-weight: 600;
        font-style: normal;
      }
      #national-park {
        font-family: "National Park", sans-serif;
        font-optical-sizing: auto;
        font-weight: 400;
        font-style: normal;
      }
      .switch {
        position: relative;
        display: inline-block;
        width: 40px;
        height: 22px;
      }

      .switch input {
        opacity: 0;
        width: 0;
        height: 0;
      }

      .slider {
        position: absolute;
        cursor: pointer;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background-color: #ccc;
        transition: 0.4s;
        border-radius: 34px;
      }

      .slider:before {
        position: absolute;
        content: "";
        height: 16px;
        width: 16px;
        left: 3px;
        bottom: 3px;
        background-color: white;
        transition: 0.4s;
        border-radius: 50%;
      }

      input:checked + .slider {
        background-color: #4f46e5;
      }

      input:checked + .slider:before {
        transform: translateX(18px);
      }

      .dark-mode {
        background-color: #1a202c;
        color: #e2e8f0;
      }

      .dark-mode .bg-white {
        background-color: #2d3748;
      }

      .dark-mode .text-gray-500 {
        color: #a0aec0;
      }

      .dark-mode .bg-gray-200 {
        background-color: #4a5568;
      }

      .dark-mode select {
        background-color: #2d3748;
        color: #cbd5e0;
      }

      .dark-mode .no-dark-mode {
        background-color: #e2e8f0;
        color: #4a5568;
      }
    </style>
   <style>
    .disabled {
      pointer-events: none;
      opacity: 0.5;
      cursor: not-allowed;
    }
  </style>
  <script>if(localStorage.getItem("user_email")==="bantayteam72.admin@gmail.com"){document.write("<style>a[href*=\"analytics_and_reports.html\"], a[href*=\"user-management.html\"] { display: none !important; }</style>");}</script></head>
  <body class="bg-gray-100 h-screen">
    <div class="flex h-full">
      <!-- Sidebar -->
      <aside class="bg-[#9F2424] text-white w-64 p-4 flex flex-col sidebar">
        <div class="flex items-center pb-8">
          <i class="fas fa-plus-circle text-2xl pr-3"></i>
          <span class="text-3xl font-bold">Bantay 72</span>
        </div>
        <nav class="flex flex-col gap-5">
          <a
            href="dashboard.html"
            class="flex items-center gap-4 p-2 hover:bg-white hover:text-red-700 rounded-md transition"
          >
            <i class="fas fa-users"></i><span>Emergency Reports</span>
          </a>
          <a
            href="volunteers.html"
            class="flex items-center gap-4 p-2 hover:bg-white hover:text-red-700 rounded-md transition"
          >
            <i class="fas fa-user-shield"></i><span>Volunteers</span>
          </a>
          <a
            href="history.html"
            class="flex items-center gap-5 p-2 hover:bg-white hover:text-red-700 rounded-md transition"
          >
            <i class="fas fa-history"></i><span>History</span>
          </a>
          <a
            href="analytics_and_reports.html"
            id="analytics-link"
            class="flex items-center gap-5 p-2 rounded-md transition"
          >
            <i class="fas fa-chart-bar"></i><span>Analytics & Reports</span>
          </a>
          <a
            href="user-management.html"
            id="user-management-link"
            class="flex items-center gap-4 p-2 rounded-md transition"
          >
            <i class="fas fa-user-cog"></i><span>User Management</span>
          </a>
        </nav>
        <div class="space-y-4 mt-auto">
          <a
            href="Settings.html"
            class="flex items-center gap-4 p-2 hover:bg-white hover:text-red-700 rounded-md transition"
          >
            <i class="fas fa-cog"></i
            ><span id="national-park">Settings</span>
          </a>
          <a
            href="admin.html"
            class="flex items-center gap-3 p-2 hover:bg-white hover:text-red-700 rounded-md transition"
          >
            <i class="fas fa-user-shield"></i
            ><span id="national-park">Admin</span>
          </a>
        </div>
      </aside>

      <!--Main-->
      <main class="flex-1 flex-col px-5 py-4">
        <h1 class="text-3xl font-bold mb-6">Report History</h1>

        <!-- Export Button -->
        <button
          id="exportPdfBtn"
          class="bg-[#9F2424] hover:bg-red-700 text-white font-bold py-2 px-4 rounded mb-4"
        >
          Export to PDF
        </button>

        <!--Sort-->
        <div class="flex justify-end mb-4">
          <div class="relative w-44" id="national-park">
            <select
              id="sortFilter"
              class="w-full appearance-none px-4 py-3 rounded-lg border border-gray-300 bg-white text-gray-800 shadow-md focus:outline-none focus:ring-2 focus:ring-[#9F2424] focus:border-transparent text-sm cursor-pointer"
            >
              <option disabled selected hidden>Sort by</option>
              <option value="weekly">Weekly</option>
              <option value="monthly">Monthly</option>
            </select>
            <div
              class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-3 text-gray-500"
            >
              <i class="fas fa-chevron-down"></i>
            </div>
          </div>
        </div>

        <!-- Table -->
        <div class="overflow-y-auto max-h-[500px] shadow-lg">
          <table class="w-full bg-white" id="reportTable">
            <thead class="bg-[#9F2424] text-white sticky top-0 z-9">
              <tr>
                <th class="p-3" id="radio-canada-big">Type of Incident</th>
                <th class="p-3" id="radio-canada-big">User</th>
                <th class="p-3" id="radio-canada-big">Volunteer?</th>
                <th class="p-3" id="radio-canada-big">Description</th>
                <th class="p-3" id="radio-canada-big">Occurence Date</th>
                <th class="p-3" id="radio-canada-big">Status</th>
              </tr>
            </thead>
            <tbody>
              <tr id="loading-row">
                <td colspan="8" class="p-3 text-center text-gray-500">
                  Loading reports...
                </td>
              </tr>
              <tr id="no-data-row" class="hidden">
                <td colspan="8" class="p-3 text-center text-gray-500">
                  No report history available as of the moment
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </main>
    </div>

    <!-- PDF Export Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js?v=2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js?v=2"></script>
  </body>
</html>
