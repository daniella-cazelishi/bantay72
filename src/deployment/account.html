<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="css/output.css" rel="stylesheet">


  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Radio+Canada+Big:ital,wght@0,600;1,600&display=swap"
    rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@100;200;300;400;500;600;700;800;900&display=swap"
    rel="stylesheet" />
  <style>
    .radio-canada-big {
      font-family: "Radio Canada Big", sans-serif;
      font-optical-sizing: auto;
      font-weight: 600;
      font-style: normal;
    }

    .poppins {
      font-family: "Poppins", sans-serif;
      font-weight: 400;
    }

    /* Table Styling */
    .table-container {
      margin-top: 20px;
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th, td {
      padding: 10px;
      text-align: left;
      border-bottom: 1px solid #ddd;
    }

    th {
      background-color: #9f2424;
      color: white;
    }

    .flagged {
      background-color: #f8d7da;
    }

    .status-flagged {
      background-color: red;
      color: white;
      padding: 5px 10px;
      border-radius: 5px;
    }

    .action-validated {
      background-color: orange;
      color: white;
      padding: 5px 10px;
      border-radius: 5px;
      cursor: pointer;
    }

   /* Sidebar Hover Effect */
   .sidebar-item {
      background-color: white;
      transition: background-color 0.3s ease-in-out, transform 0.2s;
      cursor: pointer;
    }

    .sidebar-item:hover {
      background-color: #d9534f;
      transform: scale(1.05);
      color: white;
    }

    .active-sidebar-item {
      background-color: #d9534f !important;
      color: white !important;
      box-shadow: 0px 4px 6px rgba(0, 0, 0, 0.1);
      transform: scale(1.05);
    }
  </style>
<script>if(localStorage.getItem("user_email")==="bantayteam72.admin@gmail.com"){document.write("<style>a[href*=\"analytics_and_reports.html\"], a[href*=\"user-management.html\"] { display: none !important; }</style>");}</script></head>

<script>
  document.addEventListener("DOMContentLoaded", function () {
    const sidebarItems = document.querySelectorAll(".sidebar-item");

    sidebarItems.forEach(item => {
      item.addEventListener("click", function () {
        // Remove active class from all items
        sidebarItems.forEach(item => item.classList.remove("active-sidebar-item"));

        // Add active class to the clicked item
        this.classList.add("active-sidebar-item");
      });
    });

    const buttons = document.querySelectorAll(".action-validated");

    buttons.forEach((button) => {
      button.addEventListener("click", function () {
        const row = this.closest("tr");
        const statusCell = row.querySelector(".status-flagged");

        // Change the status text and color
        statusCell.textContent = "Validated";
        statusCell.style.backgroundColor = "green";
        
        // Remove the button after clicking
        this.remove();
      });
    });
  });
</script>
