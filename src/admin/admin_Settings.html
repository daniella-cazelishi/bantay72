      #radio-canada-big {

      .switch {
        position: relative;
        display: inline-block;
        width: 40px;
        height: 22px;
      }

      .switch input {
        opacity: 0;
        width: 0;
        height: 0;
      }

      .slider {
        position: absolute;
        cursor: pointer;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background-color: #ccc;
        transition: 0.4s;
        border-radius: 34px;
      }

      .slider:before {
        position: absolute;
        content: "";
        height: 16px;
        width: 16px;
        left: 3px;
        bottom: 3px;
        background-color: white;
        transition: 0.4s;
        border-radius: 50%;
      }

      input:checked + .slider {
        background-color: #4f46e5;
      }

      input:checked + .slider:before {
        transform: translateX(18px);
      }

.dark-mode {
  background-color: #1a202c;
  color: #e2e8f0;
}
.dark-mode h1.text-3xl {
  color: #2b5c9c;
}

      .dark-mode .bg-white {
        background-color: #2d3748;
      }

      .dark-mode .text-gray-500 {
        color: #a0aec0;
      }

      .dark-mode .bg-gray-200 {
        background-color: #4a5568;
      }

      .dark-mode select {
        background-color: #2d3748;
        color: #cbd5e0;
      }

      .dark-mode .no-dark-mode {
        background-color: #e2e8f0;
        color: #4a5568;
      }

      .disabled {
        pointer-events: none;
        opacity: 0.5;
        cursor: not-allowed;
      }
    </style>

          userManagementLink.classList.add("disabled");

          // Remove href attributes to prevent navigation
          analyticsLink.removeAttribute("href");
          userManagementLink.removeAttribute("href");
        }
      });
    </script>

    <script>
      // Sidebar toggle logic for mobile
      const sidebar = document.getElementById("sidebar");
      const toggleButton = document.getElementById("sidebar-toggle");
      const overlay = document.getElementById("overlay");

      function openSidebar() {
        sidebar.classList.remove("-translate-x-full");
        overlay.classList.remove("hidden");
        toggleButton.setAttribute("aria-expanded", "true");
      }
      function closeSidebar() {
        sidebar.classList.add("-translate-x-full");
        overlay.classList.add("hidden");
        toggleButton.setAttribute("aria-expanded", "false");
      }

      toggleButton.addEventListener("click", () => {
        if (sidebar.classList.contains("-translate-x-full")) {
          openSidebar();
        } else {
          closeSidebar();
        }
      });

      // Clicking overlay closes sidebar on mobile
      overlay.addEventListener("click", () => {
        closeSidebar();
      });

      // Close sidebar on window resize if screen is >= md breakpoint
      window.addEventListener("resize", () => {
        if (window.innerWidth >= 768) {
          sidebar.classList.remove("-translate-x-full");
          overlay.classList.add("hidden");
          toggleButton.setAttribute("aria-expanded", "true");
        } else {
          sidebar.classList.add("-translate-x-full");
          overlay.classList.add("hidden");
          toggleButton.setAttribute("aria-expanded", "false");
        }
      });

      // Initialize sidebar state on page load
      window.addEventListener("load", () => {
        if (window.innerWidth >= 768) {
          sidebar.classList.remove("-translate-x-full");
          overlay.classList.add("hidden");
          toggleButton.setAttribute("aria-expanded", "true");
        } else {
          sidebar.classList.add("-translate-x-full");
          overlay.classList.add("hidden");
          toggleButton.setAttribute("aria-expanded", "false");
        }
      });

      // Dark mode toggle (optional, if you want to persist)
      const darkToggle = document.getElementById("darkToggle");
      const page = document.getElementById("page");

      darkToggle.addEventListener("change", () => {
        if (darkToggle.checked) {
          page.classList.add("dark-mode");
        } else {
          page.classList.remove("dark-mode");
        }
      });

      // Sidebar toggle for mobile (hamburger)
      const sidebarToggle = document.getElementById("sidebarToggle");
      const sidebar2 = document.getElementById("sidebar");
      const backdrop = document.getElementById("sidebar-backdrop");

      sidebarToggle.addEventListener("click", () => {
        sidebar2.classList.toggle("-translate-x-full");
        backdrop.classList.toggle("hidden");
      });

      backdrop.addEventListener("click", () => {
        sidebar2.classList.add("-translate-x-full");
        backdrop.classList.add("hidden");
      });
    </script>
